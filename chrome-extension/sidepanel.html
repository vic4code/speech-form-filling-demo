<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>語音填表助理</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <!-- ── Top bar ── -->
    <header class="sp-header">
      <span class="sp-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      </span>
      <span class="sp-title">語音填表</span>
      <button class="sp-icon-btn" id="settings-btn" title="設定" aria-label="設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- ── Settings drawer ── -->
    <div class="sp-settings-drawer" id="settings-drawer" hidden>
      <div class="sp-settings-group">
        <label class="sp-label">後端伺服器</label>
        <input id="server-url" class="sp-input" type="url" placeholder="http://localhost:8000" />
      </div>
      <div class="sp-settings-row">
        <div class="sp-settings-group sp-flex1">
          <label class="sp-label">表單</label>
          <select id="form-select" class="sp-select"></select>
        </div>
        <div class="sp-settings-group sp-flex1">
          <label class="sp-label">模式</label>
          <select id="mode-select" class="sp-select">
            <option value="realtime">即時對話</option>
            <option value="batch">錄音整理</option>
          </select>
        </div>
      </div>
      <div class="sp-settings-row">
        <div class="sp-settings-group sp-flex1" id="realtime-model-group">
          <label class="sp-label">語音模型</label>
          <select id="model-select" class="sp-select"></select>
        </div>
        <div class="sp-settings-group sp-flex1" id="transcribe-model-group" style="display:none">
          <label class="sp-label">轉譯模型</label>
          <select id="transcribe-model-select" class="sp-select"></select>
        </div>
        <div class="sp-settings-group sp-flex1" id="structure-model-group" style="display:none">
          <label class="sp-label">整理模型</label>
          <select id="structure-model-select" class="sp-select"></select>
        </div>
      </div>
      <div class="sp-settings-row sp-settings-row--between">
        <label class="sp-toggle-row">
          <input type="checkbox" id="guardrail-enabled" />
          <span class="sp-toggle-label">Guardrail</span>
        </label>
        <label class="sp-toggle-row">
          <input type="checkbox" id="fill-page-enabled" checked />
          <span class="sp-toggle-label">填入當前頁面</span>
        </label>
      </div>
      <div class="sp-settings-actions">
        <button class="sp-btn sp-btn-primary" id="save-settings">儲存設定</button>
      </div>
    </div>

    <!-- ── Status chips ── -->
    <div class="sp-chips">
      <div class="sp-form-chip" id="form-chip">
        <span class="sp-eyebrow">填寫</span>
        <span id="form-chip-label">—</span>
        <a id="form-link" class="sp-chip-link" target="_blank" rel="noopener" style="display:none">↗</a>
      </div>
      <div id="guardrail-warning" class="sp-toast sp-toast--warn hidden">
        <strong>Guardrail：</strong><span id="guardrail-warning-msg"></span>
        <button class="sp-toast-close" onclick="this.parentElement.classList.add('hidden')">×</button>
      </div>
      <div id="browser-status" class="sp-status-chip" style="display:none">
        <span id="browser-status-text"></span>
      </div>
    </div>

    <!-- ── Chat ── -->
    <main class="sp-chat-wrapper">
      <div class="sp-chat" id="chat"></div>
    </main>

    <!-- ── Composer ── -->
    <footer class="sp-composer">
      <div class="sp-composer-status">
        <span class="sp-dot" id="status-dot"></span>
        <span class="sp-status-text" id="status-text">尚未連線</span>
      </div>
      <div class="sp-composer-row">
        <button class="sp-mic-btn" id="btn-start" title="開始語音" aria-label="開始語音">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
        </button>
        <button class="sp-mic-btn sp-mic-stop" id="btn-stop" title="停止" aria-label="停止" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
        <input id="chat-input" class="sp-input-field" placeholder="輸入或按麥克風開始語音…" />
        <button class="sp-send-btn" id="btn-send" title="送出" aria-label="送出">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
