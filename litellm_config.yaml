model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

guardrails:
  - guardrail_name: my-guardrail
    litellm_params:
      guardrail: aporia  # 可替換為你自己的 guardrail provider
      mode: [pre_call, post_call]
      default_on: true
