<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>語音填表 Demo</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260428a" />
  </head>
  <body>
    <header class="mobile-header">
      <div class="header-bar">
        <button class="icon-button" aria-label="返回">←</button>
        <h1>語音填表 Demo</h1>
        <a class="tab-button" href="/logs.html" style="font-size:12px">查看紀錄</a>
      </div>
    </header>

    <main class="container narrow">
      <!-- ── Guardrail warning popup ── -->
      <div id="guardrail-warning" class="guardrail-warning hidden">
        <strong>Guardrail：</strong>
        <span id="guardrail-warning-msg"></span>
        <button class="btn-dismiss" onclick="this.parentElement.classList.add('hidden')">&times;</button>
      </div>

      <!-- ── Voice control bar ── -->
      <div class="conv-voice-bar card">
        <div class="conv-voice-bar-left">
          <span class="status-dot" id="conversation-status-dot"></span>
          <span id="conversation-status-text" class="conv-voice-label">等待開始語音</span>
          <button class="button" id="conversation-start">開始語音</button>
          <button class="button secondary" id="conversation-stop">停止語音</button>
        </div>
        <div class="conv-voice-bar-right">
          <select id="model-select" class="model-select" title="選擇模型"></select>
          <label class="guardrail-toggle">
            <input type="checkbox" id="guardrail-enabled" />
            <span>Guardrail</span>
          </label>
        </div>
      </div>
      <div id="guardrail-info" class="guardrail-info" style="display:none"></div>

      <!-- ── Chat panel (full width) ── -->
      <div class="card conv-chat-card-full" style="margin-top: 16px;">
        <div class="section-title text-only"><span>對話紀錄</span></div>
        <div class="chat" id="chat"></div>
        <div class="conv-chat-input">
          <input id="chat-input" placeholder="輸入訊息…" />
          <button class="button" id="chat-send">送出</button>
        </div>
      </div>

      <!-- ── Browser fill status ── -->
      <div id="browser-status" class="browser-status" style="display:none">
        <span id="browser-status-text"></span>
      </div>

      <details id="session-debug-panel" hidden style="margin-top: 16px; padding: 0 16px 16px">
        <summary style="cursor: pointer; font-size: 13px; color: #6b7280; padding: 4px 0;">
          Session Debug Log
        </summary>
        <div id="session-debug-list" style="
          margin-top: 8px; display: flex; flex-direction: column; gap: 6px;
          font-size: 12px; font-family: monospace; background: #0f172a;
          color: #e2e8f0; border-radius: 10px; padding: 10px 12px;
          max-height: 200px; overflow-y: auto;
        "></div>
      </details>
    </main>

    <script src="/static/app.js?v=20260428a"></script>
  </body>
</html>
