<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>語音填表</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260512d" />
  </head>
  <body class="ck-body">
    <header class="ck-app-header">
      <div class="ck-app-header-inner">
        <span class="ck-app-title">語音填表</span>
        <a class="ck-link-quiet" href="/logs.html">紀錄 ↗</a>
      </div>
    </header>

    <main class="ck-main">
      <!-- ── Settings: form is the loud one, the rest are quiet pills ── -->
      <div class="ck-settings">
        <div class="ck-settings-primary">
          <span class="ck-eyebrow">正在填寫</span>
          <select id="form-select" class="ck-select-primary" title="選擇要填寫的表單"></select>
          <a id="form-link" target="_blank" rel="noopener" class="ck-link-quiet">原始表單 ↗</a>
        </div>
        <div class="ck-settings-secondary">
          <select id="mode-select" class="ck-pill-select" title="選擇語音模式">
            <option value="realtime">即時對話</option>
            <option value="batch">錄音整理</option>
          </select>
          <select id="model-select" class="ck-pill-select" title="選擇 Realtime 模型"></select>
          <select id="transcribe-model-select" class="ck-pill-select" title="轉譯模型" style="display:none"></select>
          <select id="structure-model-select" class="ck-pill-select" title="整理模型" style="display:none"></select>
          <label class="ck-toggle-pill">
            <input type="checkbox" id="guardrail-enabled" />
            <span>Guardrail</span>
          </label>
        </div>
      </div>

      <!-- Guardrail warning toast -->
      <div id="guardrail-warning" class="ck-toast hidden">
        <strong>Guardrail：</strong>
        <span id="guardrail-warning-msg"></span>
        <button class="ck-toast-close" onclick="this.parentElement.classList.add('hidden')">×</button>
      </div>
      <div id="guardrail-info" class="ck-info-row" style="display:none"></div>

      <!-- Browser fill status chip -->
      <div id="browser-status" class="ck-status-chip" style="display:none">
        <span id="browser-status-text"></span>
      </div>

      <!-- Chat -->
      <section class="ck-chat-wrapper">
        <div class="chat ck-chat" id="chat"></div>
      </section>

      <details id="session-debug-panel" hidden class="ck-debug">
        <summary>Session Debug Log</summary>
        <div id="session-debug-list" class="ck-debug-list"></div>
      </details>
    </main>

    <!-- Sticky composer -->
    <footer class="ck-composer">
      <div class="ck-composer-inner">
        <div class="ck-composer-status">
          <span class="ck-status-dot" id="conversation-status-dot"></span>
          <span id="conversation-status-text" class="ck-status-text">尚未連線</span>
        </div>
        <div class="ck-composer-row">
          <button class="ck-mic-btn" id="conversation-start" title="開始語音" aria-label="開始語音">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
          </button>
          <button class="ck-mic-btn ck-mic-stop" id="conversation-stop" title="停止語音" aria-label="停止語音">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
          <input id="chat-input" class="ck-composer-input" placeholder="輸入訊息，或按麥克風開始語音…" />
          <button class="ck-send-btn" id="chat-send" title="送出" aria-label="送出">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </footer>

    <script src="/static/app.js?v=20260512h"></script>
  </body>
</html>
