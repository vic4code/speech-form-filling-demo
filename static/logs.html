<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Logs · 語音填表</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260506a" />
  </head>
  <body class="ck-body ck-body-logs">
    <header class="ck-app-header">
      <div class="ck-app-header-inner">
        <span class="ck-app-title">Session Logs</span>
        <a class="ck-link-quiet" href="/">← 回填單</a>
      </div>
    </header>

    <main class="ck-main ck-main-wide">
      <div class="ck-page-header">
        <h1 class="ck-page-h1">Session Logs</h1>
        <p class="ck-page-sub">每次 WebSocket 連線的完整事件時序與表單提交記錄</p>
      </div>

      <!-- Summary stats -->
      <div class="ck-stats">
        <div class="ck-stat">
          <span class="ck-stat-label">總筆數</span>
          <span class="ck-stat-value" id="summary-count">0</span>
        </div>
        <div class="ck-stat">
          <span class="ck-stat-label">總成本</span>
          <span class="ck-stat-value" id="summary-cost">$0.000</span>
        </div>
        <div class="ck-stat">
          <span class="ck-stat-label">平均填表時間</span>
          <span class="ck-stat-value" id="summary-avg-time">--</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="ck-toolbar">
        <input id="log-search" class="ck-input" placeholder="搜尋 Session ID / 內容關鍵字" />
        <select id="log-mode" class="ck-pill-select">
          <option value="all">所有模式</option>
          <option value="stt">STT</option>
          <option value="conversation">Conversation</option>
        </select>
        <select id="log-guardrail" class="ck-pill-select">
          <option value="all">所有 Guardrail</option>
          <option value="keyword">關鍵字</option>
          <option value="off">Guardrail OFF</option>
        </select>
        <button class="ck-btn-ghost" id="log-refresh">重新整理</button>
        <button class="ck-btn-danger-ghost" id="log-delete-all">全部清除</button>
      </div>

      <div id="logs" class="log-list ck-log-list"></div>
      <div id="logs-empty" class="ck-empty" style="display: none;">尚無紀錄</div>
    </main>

    <script src="/static/logs.js?v=20260506a"></script>
  </body>
</html>
